<div class="flag-dock">
    <div class="fd-bar">
        <mat-icon class="fd-icon">flag</mat-icon>
        <span class="fd-title">SUBMIT FLAG</span>
    </div>
    <div class="fd-body">
        <div class="hints-area">
            <ng-content />
        </div>
        <div class="ans-row">
            <span class="flag-prompt">FLAG&gt;</span>
            <mat-form-field
                (keydown.enter)="$event.preventDefault()"
                appearance="outline"
                class="input-form-field"
                subscriptSizing="dynamic">
                <input
                    (keydown)="keyboardSubmitAnswer($event)"
                    [(ngModel)]="answer"
                    [ngModelOptions]="{ standalone: true }"
                    autocomplete="off"
                    matInput
                    placeholder="FLAG{...}"
                />
                <button
                    (click)="answer.set('')"
                    [hidden]="!answer()"
                    aria-label="Clear"
                    mat-icon-button
                    matSuffix
                >
                    <mat-icon>close</mat-icon>
                </button>
            </mat-form-field>
            <button
                (click)="submitAnswer()"
                [disabled]="isLoading()"
                class="sub-btn"
                mat-flat-button
            >
                {{ buttonLabel() }}
            </button>
        </div>
    </div>
</div>
