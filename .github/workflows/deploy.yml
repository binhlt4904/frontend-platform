name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend-platform:latest

      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to server via Tailscale
        uses: appleboy/ssh-action@v1
        with:
          host: 100.76.219.87
          username: sp26-ojt
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ssh -i /home/sp26-ojt/kypo-sp26/kypo-sp26/.vagrant/machines/default/libvirt/private_key \
              -o StrictHostKeyChecking=no \
              vagrant@192.168.121.103 \
              "sudo kubectl set image deployment/angular-frontend angular-frontend=${{ secrets.DOCKERHUB_USERNAME }}/frontend-platform:latest -n crczp && sudo kubectl rollout status deployment/angular-frontend -n crczp"